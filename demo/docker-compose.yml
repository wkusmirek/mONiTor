version: "3.3"
services:
  minknow-exporter-1:
    image: "wkusmirek/minknow-exporter:latest"
    network_mode: "host"
    volumes:
      - /tmp:/tmp
    command: ["--web.listen-address", ":9311", "--host", "localhost", "--port", "9502", "--overriddedHost", "10.153.12.161", "--overriddedPort", "9502"]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
  minknow-exporter-2:
    image: "wkusmirek/minknow-exporter:latest"
    network_mode: "host"
    volumes:
      - /tmp:/tmp
    command: ["--web.listen-address", ":9312", "--host", "localhost", "--port", "9503", "--overriddedHost", "10.153.12.162", "--overriddedPort", "9502"]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
  fast5-exporter-1:
    image: "wkusmirek/fast5-exporter:latest"
    network_mode: "host"
    volumes:
      - /tmp:/tmp
    command: ["--web.listen-address", ":9307", "--host", "localhost", "--port", "9307", "--path", "/tmp/fast5/1", "--overriddedHost", "10.153.12.161", "--overriddedPort", "5555", "--overriddedPath", "/data/ont/fast5"]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
  fast5-exporter-2:
    image: "wkusmirek/fast5-exporter:latest"
    network_mode: "host"
    volumes:
      - /tmp:/tmp
    command: ["--web.listen-address", ":9308", "--host", "localhost", "--port", "9308", "--path", "/tmp/fast5/2", "--overriddedHost", "10.153.12.162", "--overriddedPort", "5555", "--overriddedPath", "/data/ont/fast5"]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
  fastq-exporter-1:
    image: "wkusmirek/fastq-exporter:latest"
    network_mode: "host"
    volumes:
      - /tmp:/tmp
    command: ["--web.listen-address", ":9309", "--host", "localhost", "--port", "9309", "--path", "/tmp/fastq/1", "--overriddedHost", "10.153.12.161", "--overriddedPort", "5555", "--overriddedPath", "/data/ont/fastq"]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
  fastq-exporter-2:
    image: "wkusmirek/fastq-exporter:latest"
    network_mode: "host"
    volumes:
      - /tmp:/tmp
    command: ["--web.listen-address", ":9310", "--host", "localhost", "--port", "9310", "--path", "/tmp/fastq/2", "--overriddedHost", "10.153.12.162", "--overriddedPort", "5555", "--overriddedPath", "/data/ont/fastq"]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
  prometheus:
    image: "prom/prometheus:latest"
    network_mode: "host"    
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M 
      restart_policy:
        condition: on-failure
  grafana:
    image: "grafana/grafana:latest"
#    user: root
#    environment:
#      - GF_SERVER_HTTP_PORT=80
    network_mode: "host"    
    volumes:
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ../grafana/data:/var/lib/grafana
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M 
      restart_policy:
        condition: on-failure        
